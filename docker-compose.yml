services:
  scanner:
    build: ./scanner
    container_name: securepipe_scanner
    ports:
      - "8001:8001"
    volumes:
      - ./repos:/repos
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scanner:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload